<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Sapelo Tides"/>
<title>Sapelo Island Tides</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a1628;color:#e8f4ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding-bottom:40px}
.card{background:#0e213d;border:1px solid #1a3a60;border-radius:16px;padding:14px 16px;margin-bottom:14px}
.label{font-size:11px;color:#6a9cc8;margin-bottom:4px;text-transform:uppercase}
input[type=date],input[type=time]{background:transparent;border:none;color:#e8f4ff;font-size:15px;font-weight:600;width:100%;outline:none;font-family:inherit;-webkit-appearance:none}
input::-webkit-calendar-picker-indicator{filter:invert(.7)}
a{color:#60d0f8}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.row{display:flex;justify-content:space-between;align-items:center}
.tag-h{color:#34d399} .tag-l{color:#f87171}
.dim{color:#4a7a9a} .mid{color:#6a9cc8}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
const DEG=Math.PI/180, SYNODIC=29.53059;
function mod360(x){return((x%360)+360)%360}

// ── Moon ──────────────────────────────────────────────
function moonPhase(ds){
  const[y,mo,d]=ds.split("-").map(Number);
  const jd=new Date(y,mo-1,d,12).getTime()/86400000+2440587.5;
  const T=(jd-2451545)/36525;
  const ml=mod360(218.3164477+481267.88123421*T);
  const sl=mod360(280.4664567+36000.76982779*T);
  const el=mod360(ml-sl);
  const pct=(1-Math.cos(el*DEG))/2;
  const age=(el/360)*SYNODIC;
  const P=[[1.85,"New Moon","🌑"],[5.54,"Waxing Crescent","🌒"],[9.22,"First Quarter","🌓"],
           [12.91,"Waxing Gibbous","🌔"],[16.61,"Full Moon","🌕"],[20.30,"Waning Gibbous","🌖"],
           [23.99,"Last Quarter","🌗"],[27.68,"Waning Crescent","🌘"],[99,"New Moon","🌑"]];
  const[,name,emoji]=P.find(([l])=>age<l);
  return{pct,age,name,emoji};
}

// ── Tides ─────────────────────────────────────────────
const CONSTS=[
  {name:"M2",speed:28.9841042,H:3.65,k:154.2},
  {name:"S2",speed:30.0000000,H:0.52,k:190.8},
  {name:"N2",speed:28.4397295,H:0.74,k:132.1},
  {name:"K2",speed:30.0821373,H:0.14,k:191.5},
  {name:"K1",speed:15.0410686,H:0.39,k:240.3},
  {name:"O1",speed:13.9430356,H:0.27,k:221.0},
  {name:"P1",speed:14.9589314,H:0.13,k:238.0},
  {name:"Q1",speed:13.3986609,H:0.06,k:201.5},
  {name:"M4",speed:57.9682084,H:0.09,k:258.0},
  {name:"MS4",speed:58.9841042,H:0.04,k:285.0},
];
const Z0=4.21;

function astroAt(jd){
  const T=(jd-2451545)/36525;
  return{s:mod360(218.3164477+481267.88123421*T),h:mod360(280.4664567+36000.76982779*T),
         p:mod360(83.3532465+4069.01363556*T),N:mod360(125.0445479-1934.13626197*T)};
}
function nodeFacs(N){
  const c=Math.cos(N*DEG),s=Math.sin(N*DEG),c2=Math.cos(2*N*DEG),s2=Math.sin(2*N*DEG);
  return{M2:{f:1-0.037*c,u:-2.14*s},S2:{f:1,u:0},N2:{f:1-0.037*c,u:-2.14*s},
         K2:{f:1.024+0.286*c+0.008*c2,u:-17.74*s+0.68*s2},
         K1:{f:1.006+0.115*c-0.009*c2,u:-8.86*s+0.68*s2},
         O1:{f:1+0.189*c-0.0058*c2,u:10.8*s-1.34*s2},P1:{f:1,u:0},
         Q1:{f:1+0.189*c-0.0058*c2,u:10.8*s},
         M4:{f:Math.pow(1-0.037*c,2),u:-4.28*s},MS4:{f:1-0.037*c,u:-2.14*s}};
}
function eqArg(ast,name){
  const{s,h,p}=ast;
  switch(name){
    case"M2":return mod360(2*h-2*s);case"S2":return 0;
    case"N2":return mod360(2*h-3*s+p);case"K2":return mod360(2*h);
    case"K1":return mod360(h+270);case"O1":return mod360(h-2*s+90);
    case"P1":return mod360(-h+270);case"Q1":return mod360(h-3*s+p+90);
    case"M4":return mod360(4*h-4*s);case"MS4":return mod360(2*h-2*s);default:return 0;
  }
}
function computeTides(ds){
  const[y,mo,d]=ds.split("-").map(Number);
  const jd0=new Date(y,mo-1,d,0).getTime()/86400000+2440587.5;
  const ast=astroAt(jd0);const nf=nodeFacs(ast.N);
  const cs=CONSTS.map(c=>{const{f=1,u=0}=nf[c.name]||{};
    return{speed:c.speed,V:eqArg(ast,c.name),H_eff:c.H*f,k_eff:c.k-u}});
  function ht(hr){let h=Z0;for(const c of cs)h+=c.H_eff*Math.cos((c.V+c.speed*hr-c.k_eff)*DEG);return Math.max(0,h)}
  const hourly=Array.from({length:25},(_,h)=>({hour:h,ft:+ht(h).toFixed(2)}));
  const STEP=1/20;
  const pts=Array.from({length:Math.ceil(24/STEP)+2},(_,i)=>({h:i*STEP,ft:ht(i*STEP)}));
  const hilo=[];
  for(let i=1;i<pts.length-1;i++){
    if(pts[i].h>=24)break;
    const a=pts[i-1].ft,b=pts[i].ft,c2=pts[i+1].ft;
    if((b>a&&b>c2)||(b<a&&b<c2)){
      const tot=Math.round(pts[i].h*60),hr=Math.floor(tot/60)%24,mn=tot%60;
      const pad=n=>String(n).padStart(2,"0");
      hilo.push({time:`${pad(hr)}:${pad(mn)}`,ft:+b.toFixed(2),type:(b>a&&b>c2)?"H":"L",hour:pts[i].h});
    }
  }
  return{hourly,hilo};
}

// ── Ferry ─────────────────────────────────────────────
// Each day: sapelo[] = depart Sapelo times, meridian[] = depart Meridian times
const FERRY={
  0:{sapelo:["8:30 AM","4:00 PM"],meridian:["9:00 AM","4:30 PM"],sun2note:true},
  1:{sapelo:["7:00 AM","12:00 PM","4:30 PM"],meridian:["8:30 AM","3:30 PM","5:30 PM"]},
  2:{sapelo:["7:00 AM","2:30 PM","4:30 PM"],meridian:["8:30 AM","3:30 PM","5:30 PM"]},
  3:{sapelo:["7:00 AM","12:00 PM","4:30 PM"],meridian:["8:30 AM","3:30 PM","5:30 PM"]},
  4:{sapelo:["7:00 AM","2:30 PM","4:30 PM"],meridian:["8:30 AM","3:30 PM","5:30 PM"]},
  5:{sapelo:["7:00 AM","12:00 PM","4:30 PM"],meridian:["8:30 AM","3:30 PM","5:30 PM"]},
  6:{sapelo:["8:00 AM","12:30 PM","4:30 PM"],meridian:["9:00 AM","3:30 PM","5:30 PM"]},
};
const DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function isHoliday(y,mo,d){
  if(mo===1&&d===1)return"New Year's Day";
  if(mo===12&&d===25)return"Christmas";
  if(mo===11){const dt=new Date(y,10,1);const f=(11-dt.getDay())%7+1;if(d===f+21)return"Thanksgiving";}
  if(mo===1){const dt=new Date(y,0,1);const f=(8-dt.getDay())%7+1;if(d===f+14)return"MLK Day";}
  return null;
}
function isHolidaySched(y,mo,d){
  if(mo===7&&d===4)return true;
  if(mo===5){const l=new Date(y,5,0);if(d===l.getDate()-((l.getDay()+6)%7))return true;}
  if(mo===9){const dt=new Date(y,8,1);if(d===(8-dt.getDay())%7+1)return true;}
  return false;
}
function is12Sun(y,mo,d){
  const dt=new Date(y,mo-1,d);if(dt.getDay()!==0)return false;
  const f=new Date(y,mo-1,1);const s1=1+(7-f.getDay())%7;
  return d===s1||d===s1+7;
}
function getFerry(ds){
  const[y,mo,d]=ds.split("-").map(Number);
  const hol=isHoliday(y,mo,d);
  if(hol)return{sapelo:[],meridian:[],closed:hol};
  if(isHolidaySched(y,mo,d))return{sapelo:["2:00 PM"],meridian:["2:30 PM"],closed:null,holSched:true};
  const dow=new Date(y,mo-1,d).getDay();
  const day=FERRY[dow]||{sapelo:[],meridian:[]};
  let sapelo=[...day.sapelo];
  let meridian=[...day.meridian];
  // Add 1st/2nd Sunday extra run
  if(dow===0&&is12Sun(y,mo,d)){
    sapelo=["8:30 AM","2:00 PM","4:00 PM"];
    meridian=["9:00 AM","2:30 PM","4:30 PM"];
  }
  return{sapelo,meridian,closed:null};
}
function parseT(ts){
  const m=ts.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return null;
  let h=parseInt(m[1]),mn=parseInt(m[2]);
  if(m[3].toUpperCase()==="PM"&&h!==12)h+=12;
  if(m[3].toUpperCase()==="AM"&&h===12)h=0;
  return h+mn/60;
}

// ── Helpers ───────────────────────────────────────────
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function nowStr(){const d=new Date();return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`}
function fmtHr(h){const hr=Math.floor(h)%24,mn=Math.round((h%1)*60);return`${hr%12||12}:${String(mn).padStart(2,"0")} ${hr>=12?"PM":"AM"}`}
function fmtHiLo(t){const[h,m]=t.split(":").map(Number);return`${h%12||12}:${String(m).padStart(2,"0")} ${h>=12?"PM":"AM"}`}
function interp(hourly,tgt){
  const b=[...hourly].reverse().find(d=>d.hour<=tgt);
  const a=hourly.find(d=>d.hour>tgt);
  if(b&&a)return+(b.ft+(tgt-b.hour)/(a.hour-b.hour)*(a.ft-b.ft)).toFixed(2);
  return b?b.ft:a?a.ft:null;
}
function tColor(ft,lo,hi){const p=(ft-lo)/(hi-lo);return p>.66?"#34d399":p>.33?"#60d0f8":"#f87171"}
function fmtShort(h){return h===0?"12A":h===12?"12P":`${h%12}${h>=12?"P":"A"}`}

// ── SVG Chart ─────────────────────────────────────────
function drawChart(canvas,hourly,hilo,tgt,spotColor){
  if(!canvas||!hourly.length)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth,H=160;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr);

  const PL=36,PR=12,PT=22,PB=28;
  const cW=W-PL-PR,cH=H-PT-PB;
  const lo=Math.min(...hourly.map(d=>d.ft));
  const hi=Math.max(...hourly.map(d=>d.ft));
  const yLo=lo-0.3,yHi=hi+0.3;

  function px(hr){return PL+((hr)/24)*cW}
  function py(ft){return PT+cH-(ft-yLo)/(yHi-yLo)*cH}

  // Grid
  ctx.strokeStyle="#1a3a60";ctx.lineWidth=1;ctx.setLineDash([3,3]);
  for(let v=Math.ceil(yLo);v<=yHi;v++){
    ctx.beginPath();ctx.moveTo(PL,py(v));ctx.lineTo(W-PR,py(v));ctx.stroke();
  }
  ctx.setLineDash([]);

  // Area fill
  const grad=ctx.createLinearGradient(0,PT,0,H-PB);
  grad.addColorStop(0,"rgba(96,208,248,0.45)");
  grad.addColorStop(1,"rgba(96,208,248,0.03)");
  ctx.beginPath();
  ctx.moveTo(px(0),py(hourly[0].ft));
  for(let i=1;i<hourly.length;i++){
    const p0=hourly[i-1],p1=hourly[i];
    const cp=0.3*(px(p1.hour)-px(p0.hour));
    ctx.bezierCurveTo(px(p0.hour)+cp,py(p0.ft),px(p1.hour)-cp,py(p1.ft),px(p1.hour),py(p1.ft));
  }
  ctx.lineTo(px(hourly[hourly.length-1].hour),H-PB);
  ctx.lineTo(px(0),H-PB);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();ctx.moveTo(px(0),py(hourly[0].ft));
  for(let i=1;i<hourly.length;i++){
    const p0=hourly[i-1],p1=hourly[i];
    const cp=0.3*(px(p1.hour)-px(p0.hour));
    ctx.bezierCurveTo(px(p0.hour)+cp,py(p0.ft),px(p1.hour)-cp,py(p1.ft),px(p1.hour),py(p1.ft));
  }
  ctx.strokeStyle="#60d0f8";ctx.lineWidth=2.5;ctx.stroke();

  // Hi/Lo markers
  hilo.forEach(h=>{
    const col=h.type==="H"?"#34d399":"#f87171";
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.globalAlpha=0.7;
    ctx.beginPath();ctx.moveTo(px(h.hour),PT);ctx.lineTo(px(h.hour),H-PB);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(px(h.hour),py(h.ft),4,0,Math.PI*2);
    ctx.fillStyle=col;ctx.fill();
    ctx.fillStyle=col;ctx.font="bold 8px system-ui";ctx.textAlign="center";
    ctx.fillText(h.ft.toFixed(1)+"'",px(h.hour),h.type==="H"?PT-5:H-PB+13);
  });

  // Current time
  ctx.strokeStyle=spotColor;ctx.lineWidth=2;ctx.setLineDash([5,3]);
  ctx.beginPath();ctx.moveTo(px(tgt),PT);ctx.lineTo(px(tgt),H-PB);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=spotColor;ctx.font="bold 9px system-ui";ctx.textAlign="center";
  ctx.fillText(fmtHr(tgt),Math.min(px(tgt),W-PR-20),PT-5);

  // Y labels
  ctx.fillStyle="#4a7a9a";ctx.font="9px system-ui";ctx.textAlign="right";
  for(let v=Math.ceil(yLo);v<=yHi;v++)ctx.fillText(v+"'",PL-4,py(v)+4);

  // X labels
  ctx.textAlign="center";
  [0,3,6,9,12,15,18,21].forEach(h=>ctx.fillText(fmtShort(h),px(h),H-PB+13));
}

// ── Moon SVG string ───────────────────────────────────
function moonSVG(age,size=52){
  const r=size/2-1,cx=size/2,cy=size/2;
  const termRx=Math.abs(Math.cos((age/SYNODIC)*Math.PI))*r;
  const waning=age>=SYNODIC/2;
  const L="#f5e882",D="#0a1628",ls=waning?0:1;
  const ellipse=termRx>0.5?`<ellipse cx="${cx}" cy="${cy}" rx="${termRx}" ry="${r}" fill="${waning?L:D}"/>`:``; 
  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="${D}" stroke="#2a4a70" stroke-width="1"/>
    <path d="M${cx} ${cy-r}A${r} ${r} 0 0 ${ls} ${cx} ${cy+r}Z" fill="${L}"/>
    <path d="M${cx} ${cy-r}A${r} ${r} 0 0 ${1-ls} ${cx} ${cy+r}Z" fill="${D}"/>
    ${ellipse}
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${L}" stroke-width=".4" stroke-opacity=".2"/>
  </svg>`;
}

// ── Render ────────────────────────────────────────────
function render(){
  const date=document.getElementById("inp-date").value;
  const time=document.getElementById("inp-time").value;
  const[hh,mm]=time.split(":").map(Number);
  const tgt=hh+mm/60;

  const{hourly,hilo}=computeTides(date);
  const moon=moonPhase(date);
  const spotFt=interp(hourly,tgt);
  const lo=hourly.length?Math.min(...hourly.map(d=>d.ft)):0;
  const hi=hourly.length?Math.max(...hourly.map(d=>d.ft)):9;
  const sc=spotFt!==null?tColor(spotFt,lo,hi):"#60d0f8";
  const gPct=spotFt!==null?Math.max(0,Math.min(100,((spotFt-lo)/(hi-lo))*100)):50;
  const bef=[...hourly].reverse().find(d=>d.hour<=tgt);
  const aft=hourly.find(d=>d.hour>tgt);
  const dir=(bef&&aft)?(aft.ft>bef.ft?"Rising ↑":"Falling ↓"):"";
  const nextEv=hilo.find(h=>h.hour>tgt);
  const[y,mo,d]=date.split("-").map(Number);
  const dow=new Date(y,mo-1,d).getDay();
  const{sapelo,meridian,closed,holSched}=getFerry(date);

  // Ferry next departure from either dock after current time
  const nextSapeloIdx=sapelo.findIndex(t=>{const v=parseT(t);return v!==null&&v>tgt;});
  const nextMeridianIdx=meridian.findIndex(t=>{const v=parseT(t);return v!==null&&v>tgt;});

  document.getElementById("moon-icon").innerHTML=moonSVG(moon.age,52);
  document.getElementById("moon-name").textContent=moon.name;
  document.getElementById("moon-detail").textContent=`${Math.round(moon.pct*100)}% illuminated · Day ${moon.age.toFixed(1)} of 29.5`;
  document.getElementById("moon-bar-fill").style.height=`${moon.pct*100}%`;

  if(spotFt!==null){
    document.getElementById("spot-card").style.borderColor=sc+"55";
    document.getElementById("spot-card").style.boxShadow=`0 0 18px ${sc}22`;
    document.getElementById("spot-label").textContent=`Tide at ${fmtHr(tgt)}`;
    document.getElementById("spot-ft").style.color=sc;
    document.getElementById("spot-ft").textContent=spotFt.toFixed(2);
    document.getElementById("spot-dir").textContent=dir;
    document.getElementById("spot-next").textContent=nextEv?`Next ${nextEv.type==="H"?"High":"Low"}: ${nextEv.ft.toFixed(2)} ft @ ${fmtHiLo(nextEv.time)}`:"";
    document.getElementById("spot-bar").style.width=`${gPct}%`;
    document.getElementById("spot-bar").style.background=`linear-gradient(to right,#1a4a80,${sc})`;
    document.getElementById("range-lo").textContent=`Low ${lo.toFixed(1)} ft`;
    document.getElementById("range-hi").textContent=`High ${hi.toFixed(1)} ft`;
    document.getElementById("gauge-fill").style.height=`${gPct}%`;
    document.getElementById("gauge-fill").style.background=`linear-gradient(to top,${sc}aa,${sc}44)`;
  }

  // Chart
  const canvas=document.getElementById("tide-canvas");
  if(canvas){
    setTimeout(()=>drawChart(canvas,hourly,hilo,tgt,sc),10);
  }

  // Hi/Lo table
  const tbody=document.getElementById("hilo-body");
  tbody.innerHTML=hilo.map((h,i)=>{
    const isN=nextEv&&h.time===nextEv.time;
    const col=h.type==="H"?"#34d399":"#f87171";
    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;${i<hilo.length-1?"border-bottom:1px solid #132035;":""}background:${isN?"#0d2a4a":"transparent"}">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:28px;height:28px;border-radius:8px;background:${col}22;display:flex;align-items:center;justify-content:center;color:${col};font-size:13px">${h.type==="H"?"▲":"▼"}</div>
        <div>
          <div style="font-weight:700;color:${col};font-size:15px">${h.type==="H"?"High":"Low"} Tide</div>
          <div style="font-size:11px;color:#4a7a9a">${fmtHiLo(h.time)}${isN?"  ← next":""}</div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:700;font-size:19px;color:#e8f4ff">${h.ft.toFixed(2)}</div>
        <div style="font-size:11px;color:#4a7a9a">feet MLLW</div>
      </div>
    </div>`;
  }).join("");

  // Ferry
  const ferryBody=document.getElementById("ferry-body");
  const ferryDate=document.getElementById("ferry-date");
  ferryDate.textContent=`${DAYS[dow]}, ${new Date(y,mo-1,d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})} · Meridian ↔ Sapelo`;
  if(closed){
    ferryBody.innerHTML=`<div style="background:#2a1020;border:1px solid #f87171;border-radius:10px;padding:10px 12px;color:#f87171;font-size:13px">⚠️ No ferry service today (${closed})</div>`;
  } else {
    const maxRows=Math.max(sapelo.length,meridian.length);
    const rows=Array.from({length:maxRows},(_,i)=>{
      const s=sapelo[i]||"—";
      const m=meridian[i]||"—";
      const sNext=i===nextSapeloIdx;
      const mNext=i===nextMeridianIdx;
      return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:9px 10px;margin-bottom:4px;border-radius:10px;background:#091828;border:1px solid #1a3050">
        <div style="font-weight:700;color:${sNext?"#f5e882":"#34d399"};font-size:14px">${s}${sNext?" ←":""}</div>
        <div style="font-weight:700;color:${mNext?"#f5e882":"#60d0f8"};font-size:14px">${m}${mNext?" ←":""}</div>
      </div>`;
    }).join("");

    ferryBody.innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;padding:0 2px">
        <div style="font-size:10px;color:#34d399;font-weight:700;text-transform:uppercase">🏝 Depart Sapelo</div>
        <div style="font-size:10px;color:#60d0f8;font-weight:700;text-transform:uppercase">⚓ Depart Meridian</div>
      </div>
      ${rows}
      ${holSched?`<div style="font-size:10px;color:#4a7a9a;margin-top:6px">Holiday schedule — limited service</div>`:""}
      ${dow===0&&!is12Sun(...date.split("-").map(Number))?`<div style="font-size:10px;color:#4a7a9a;margin-top:6px">* 2:00 PM / 2:30 PM runs on 1st & 2nd Sunday only</div>`:""}
      <div style="font-size:10px;color:#4a7a9a;margin-top:6px">No service: New Year's, MLK Day, Thanksgiving, Christmas · Holiday sched: Mem Day, Jul 4, Labor Day</div>`;
  }
}
